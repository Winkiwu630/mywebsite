	<main>
		
		<div class="hero">

			<nav>

		<section>
			<h2>Get In Touch</h2>
			<p>Interested in having a website built? Have a question? Fill out the form below and I'll get back to you.</p>
			<br>
			<form action="https://formspree.io/f/mzdqlayd" method="POST">
				<label for="name">Name</label><br>
				<input type="text" id="name" name="name" required style="width:100%; padding:8px; margin:6px 0 14px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"><br>

				<label for="email">Email</label><br>
				<input type="email" id="email" name="email" required style="width:100%; padding:8px; margin:6px 0 14px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"><br>

				<label for="budget">Budget Range</label><br>
				<select id="budget" name="budget" style="width:100%; padding:8px; margin:6px 0 14px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
					<option value="">-- Select a range --</option>
					<option value="under500">Under $500</option>
					<option value="500-1000">$500 - $1,000</option>
					<option value="1000-1500">$1,000 - $1,500</option>
					<option value="1500+">$1,500+</option>
				</select><br>

				<label for="message">Message</label><br>
				<textarea id="message" name="message" required></textarea><br>

				<br>
				<button type="submit" class="button-link">Send Message</button>
			</form>
		</section>
